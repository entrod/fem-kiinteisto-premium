name: Deploy to GitHub Pages (Localized)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-localized
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Apply localized Pages templates
        run: |
          mkdir -p src/content src/components src/pages
          cp pages-build/src/App.tsx src/App.tsx
          cp pages-build/src/components/LanguagePicker.tsx src/components/LanguagePicker.tsx
          cp pages-build/src/content/siteContent.ts src/content/siteContent.ts
          cp pages-build/src/pages/Index.tsx src/pages/Index.tsx
          cp pages-build/src/pages/NotFound.tsx src/pages/NotFound.tsx

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: |
          npx vite build --config vite.config.pages.ts
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
