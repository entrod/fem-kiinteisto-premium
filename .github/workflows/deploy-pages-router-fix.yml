name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Patch router for GitHub Pages
        run: |
          sed -i 's|<BrowserRouter>|<BrowserRouter basename="/fem-kiinteisto-premium/">|' src/App.tsx
          sed -i 's|href="/"|href="/fem-kiinteisto-premium/"|' src/pages/NotFound.tsx

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npx vite build --config vite.config.pages.ts

      - name: Copy index to 404 for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
